# Hand2WholeBody default config. See docs/CONTRACT.md for the rationale behind every value.

frame:
  # World frame is pinned by assets/urdf/table.urdf (origin on floor below table center).
  fps: 30                      # canonical generation/training rate (Hz)
  control_fps: 50              # HoloMotion control loop; interpolate 30->50 only at handoff

representation:
  rot6d_convention: zhou_column     # CONFIRMED 2026-06-29: upstream emits Zhou-2019 columns.
  # one of: pytorch3d_row | zhou_column. Single source of truth is frames.PROJECT_R6D.
  paddle_hand_joint: 20        # SMPL left_wrist
  num_body_joints: 22          # SMPL joints 0..21 (drop rigid hand joints 22/23)
  motion_dim: 135              # root_trans(3) + 22 joints x 6D(132); h2wb.representations.body
  num_betas: 10

hand_signal:
  dim: 12                      # [pos(3) | lin_vel(3) | rot6d(6)]
  canonicalize: root_relative_pos   # none | root_relative_pos  (orientation stays global)

window:
  seq_length: 40               # M2 lifting window (~1.3 s @30Hz); causal within the window
  # for the M4 diffusion AR rollout:
  past_hand: 20
  past_body: 5
  predict: 8

model:
  arch: regressor              # regressor (M2 baseline) | diffmlp (M4 primary) | cvae (fallback-2)
  regressor:
    hidden: 256
    n_layers: 4
    n_heads: 8
    ffn: 1024
  diffmlp:                     # M4
    hidden: 512
    n_blocks: 12
    latent: 512
    sample_steps: 8
    schedule: cosine

loss:                          # keys match h2wb.losses.compute_losses
  trans: 1.0
  rot6d: 1.0
  velocity: 0.5
  fk_joint: 1.0                # FK joint-position loss (vs GT pose)
  hand_consistency: 2.0        # FK paddle wrist must match input 12D (closes the loop)

data:
  amass_root: ""               # set to local AMASS dir once available
  smpl_model_dir: ""           # set to the upstream SMPL model dir once shipped
  target_fps: 30

train:
  batch_size: 256
  lr: 2.0e-4
  device: cuda
  seed: 0
